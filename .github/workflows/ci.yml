name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: flake8 app/calculator.py --max-line-length=88

      - name: Run unit tests
        run: |
          cd app
          python -m unittest test_calculator.py -v

      - name: Build artifact
        run: |
          mkdir -p dist
          cd app/calculator.py dist/
          echo "Build: $(date)" > dist/build_info.txt  

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: calculator-app
          path: dist/


